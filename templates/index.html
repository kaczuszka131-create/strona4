<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kontrolny Klientów</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .inactive-message {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            animation: fadeIn 0.5s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .inactive-message h1 {
            font-size: 3em;
            color: #e74c3c;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .inactive-message p {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        
        .inactive-icon {
            font-size: 5em;
            color: #e74c3c;
            margin-bottom: 20px;
        }
        
        .inactive-message .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #e74c3c;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .inactive-message .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .inactive-message .refresh-btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }
        
        .inactive-message .footer-note {
            margin-top: 30px;
            font-size: 0.9em;
            color: #bdc3c7;
        }
    </style>
</head>
<body>
    <div class="inactive-message">
        <div class="inactive-icon">⛔</div>
        <h1>STRONA NIE AKTYWNA</h1>
        <p>
            <span class="status-dot"></span>
            Panel kontrolny jest obecnie wyłączony
        </p>
        <p style="font-size: 1em; color: #95a5a6;">
            Serwer nie odpowiada lub został zatrzymany
        </p>
        <div class="footer-note">
            Ostatnia próba połączenia: <span id="timestamp"></span>
        </div>
    </div>

    <script>
        // Dodaj timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString('pl-PL');
        
        // Sprawdzaj co 30 sekund czy strona jest aktywna
        setInterval(() => {
            location.reload();
        }, 30000);
    </script>
</body>
</html>
